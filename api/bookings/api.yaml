openapi: 3.0.3

info:
  title: Скалодром API — Bookings
  description: Бронирования клиента: создание, список, детали и отмена.
  version: 1.0.0

servers:
  - url: https://api.climbing-gym.ru/v1
    description: Production

tags:
  - name: Bookings
    description: Бронирования

security:
  - bearerAuth: []

paths:
  /bookings:
    post:
      tags:
        - Bookings
      summary: Создать бронь
      operationId: createBooking
      description: |
        Запись на тренировку.
        - seats_count 1..3
        - rental_count 0..seats_count
        - Итоговая цена (price_total) производна от тарифов слота
        - Операция атомарна
        - Idempotency-Key обязателен (защита от дублей)
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Бронь создана
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/CreateBookingResponse'
        '400':
          $ref: '../common/models.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '409':
          $ref: '../common/models.yaml#/components/responses/Conflict'
        '410':
          $ref: '../common/models.yaml#/components/responses/Gone'
        '422':
          $ref: '../common/models.yaml#/components/responses/UnprocessableEntity'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'
    get:
      tags:
        - Bookings
      summary: Мои брони
      operationId: listBookings
      description: |
        Список броней текущего клиента с пагинацией и фильтрацией по статусу.
        - Сортировка по slot.start_at по убыванию
        - Группировка предстоящие/прошедшие — на клиенте по slot.start_at
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/BookingStatusParam'
        - $ref: '../common/models.yaml#/components/parameters/LimitParam'
        - $ref: '../common/models.yaml#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Список броней
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/BookingListResponse'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

  /bookings/{bookingId}:
    get:
      tags:
        - Bookings
      summary: Детали брони
      operationId: getBooking
      description: Полные данные брони с вложенными данными слота/маршрута/инструктора.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/BookingIdParam'
      responses:
        '200':
          description: Детали брони
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Booking'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../common/models.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../common/models.yaml#/components/responses/NotFound'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

  /bookings/{bookingId}/cancel:
    post:
      tags:
        - Bookings
      summary: Отменить бронь
      operationId: cancelBooking
      description: |
        Отмена брони.
        
        Сервер определяет тип по времени до старта:
        - ≥2ч → cancelled (места и снаряжение возвращаются в слот)
        - <2ч → late_cancel (не возвращаются, штрафов нет)
        
        Граница ровно 2ч трактуется как ранняя.
        Отмена недоступна после старта слота.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/BookingIdParam'
      responses:
        '200':
          description: Бронь отменена
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Booking'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../common/models.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../common/models.yaml#/components/responses/NotFound'
        '409':
          $ref: '../common/models.yaml#/components/responses/Conflict'
        '422':
          $ref: '../common/models.yaml#/components/responses/UnprocessableEntity'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      $ref: '../auth/models.yaml#/components/securitySchemes/bearerAuth'