# Аутентификация: схема безопасности и DTO потока OTP (вход, регистрация, смена телефона).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access-токен, выдаётся после POST /auth/verify-code и обновляется через POST /auth/refresh.
        Передаётся в заголовке Authorization: Bearer <access_token>.

  schemas:
    RequestCodeRequest:
      type: object
      description: Запрос на отправку OTP-кода на номер телефона.
      required:
        - phone
      properties:
        phone:
          type: string
          description: Номер телефона в формате E.164 (+7XXXXXXXXXX).
          pattern: '^\+7[0-9]{10}$'
          example: '+79123456789'

    RequestCodeResponse:
      type: object
      description: Ответ на запрос OTP-кода.
      required:
        - ttl_seconds
        - resend_after_seconds
      properties:
        ttl_seconds:
          type: integer
          description: Срок жизни кода в секундах (по умолчанию 300 = 5 минут).
          example: 300
        resend_after_seconds:
          type: integer
          description: Через сколько секунд можно запросить повторную отправку (по умолчанию 60).
          example: 60

    TokenPair:
      type: object
      description: Пара JWT-токенов сессии.
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access-токен. Передаётся в заголовке Authorization.
        refresh_token:
          type: string
          description: Refresh-токен для обновления сессии через POST /auth/refresh.
        token_type:
          type: string
          enum:
            - Bearer
          example: Bearer
        expires_in:
          type: integer
          description: Срок жизни access-токена в секундах.
          example: 900

    RefreshTokenRequest:
      type: object
      description: Запрос на обновление сессии по refresh-токену.
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Действительный refresh-токен.

    VerifyCodeRequest:
      type: object
      description: Подтверждение OTP-кода и вход/регистрация.
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          description: Номер телефона в формате E.164.
          pattern: '^\+7[0-9]{10}$'
          example: '+79123456789'
        code:
          type: string
          description: OTP-код из SMS (6 цифр).
          pattern: '^[0-9]{6}$'
          example: '123456'

    VerifyCodeResponse:
      type: object
      description: Ответ на подтверждение кода — пара токенов и данные клиента.
      required:
        - tokens
        - client
        - is_new
      properties:
        tokens:
          $ref: '#/components/schemas/TokenPair'
        client:
          $ref: '../profile/models.yaml#/components/schemas/Client'
        is_new:
          type: boolean
          description: true, если клиент только что зарегистрирован (имя ещё не задано).

    PushTokenRequest:
      type: object
      description: Регистрация push-токена устройства для напоминаний.
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: Токен push-уведомлений, выданный платформой (APNs/FCM).
        platform:
          type: string
          enum:
            - ios
            - android
          example: ios

    PushTokenDeleteRequest:
      type: object
      description: Снятие регистрации push-токена устройства.
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: Токен push-уведомлений.
        platform:
          type: string
          enum:
            - ios
            - android
          example: ios

    ChangePhoneRequestCodeRequest:
      type: object
      description: Запрос на отправку OTP-кода для смены номера телефона.
      required:
        - new_phone
      properties:
        new_phone:
          type: string
          description: Новый номер телефона в формате E.164.
          pattern: '^\+7[0-9]{10}$'
          example: '+79876543210'

    ChangePhoneConfirmRequest:
      type: object
      description: Подтверждение смены номера телефона.
      required:
        - new_phone
        - code
      properties:
        new_phone:
          type: string
          description: Новый номер телефона в формате E.164.
          pattern: '^\+7[0-9]{10}$'
          example: '+79876543210'
        code:
          type: string
          description: OTP-код из SMS (6 цифр).
          pattern: '^[0-9]{6}$'
          example: '123456'