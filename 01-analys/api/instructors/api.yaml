openapi: 3.0.3

info:
  title: Скалодром API — Instructors
  description: Справочник инструкторов (read-only) для фильтрации.
  version: 1.0.0

servers:
  - url: https://api.climbing-gym.ru/v1
    description: Production

tags:
  - name: Instructors
    description: Справочник инструкторов

security:
  - bearerAuth: []

paths:
  /instructors:
    get:
      tags:
        - Instructors
      summary: Справочник инструкторов
      operationId: listInstructors
      description: Список инструкторов для фильтрации. Read-only справочник.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/LimitParam'
        - $ref: '../common/models.yaml#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Список инструкторов
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/InstructorListResponse'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      $ref: '../auth/models.yaml#/components/securitySchemes/bearerAuth'